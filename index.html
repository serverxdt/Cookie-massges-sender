<!DOCTYPE html>
<html>
<head>
    <title>FB Mass Messenger Panel</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; }
        .panel { border: 1px solid #ccc; padding: 20px; margin: 10px 0; }
        textarea { width: 100%; height: 150px; }
        button { padding: 10px 20px; background: #1877f2; color: white; border: none; cursor: pointer; }
        .status { padding: 10px; margin: 10px 0; }
        .active { background: #d4edda; color: #155724; }
        .stopped { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>🔥 Facebook Mass Messenger Panel (Pentest Tool)</h1>
    
    <div class="panel">
        <h3>1. Account Login</h3>
        <input type="text" id="uid" placeholder="FB UID/Email" style="width:48%; padding:10px;">
        <input type="password" id="password" placeholder="Password" style="width:48%; padding:10px;">
        <br><button onclick="login()">Login & Save Session</button>
        <div id="login-status"></div>
    </div>
    
    <div class="panel">
        <h3>2. Campaign Setup</h3>
        <select id="campaign-type">
            <option value="group">📢 Group Posts</option>
            <option value="e2ee">💬 E2EE/Inbox Messages</option>
        </select>
        <br><br>
        <input type="text" id="target" placeholder="Group ID / Target UID" style="width:100%; padding:10px;">
        <br><br>
        <textarea id="messages" placeholder="Message 1&#10;Message 2&#10;Message 3 (per line)"></textarea>
        <br>
        <input type="number" id="delay" value="900" placeholder="Delay in seconds (15 min)"> 
        <button onclick="startCampaign()">🚀 START Non-Stop</button>
        <button onclick="stopCampaign()">⏹️ STOP</button>
    </div>
    
    <div id="status-panel" class="status stopped">Status: Ready</div>

    <script>
    let currentSession = null;
    
    async function login() {
        const uid = document.getElementById('uid').value;
        const password = document.getElementById('password').value;
        const type = document.getElementById('campaign-type').value;
        
        const resp = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `uid=${uid}&password=${password}&${type}=1`
        });
        const data = await resp.json();
        
        if (data.success) {
            currentSession = data.session_id;
            document.getElementById('login-status').innerHTML = 
                '<span class="active">✅ Session Active: ' + currentSession + '</span>';
        }
    }
    
    async function startCampaign() {
        const messages = document.getElementById('messages').value;
        const delay = document.getElementById('delay').value;
        const target = document.getElementById('target').value;
        
        const resp = await fetch('/start_campaign', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `session_id=${currentSession}&messages=${encodeURIComponent(messages)}&delay=${delay}&target=${target}`
        });
        
        document.getElementById('status-panel').innerHTML = 
            '<span class="active">🚀 Campaign Running Non-Stop...</span>';
    }
    
    async function stopCampaign() {
        await fetch(`/stop_campaign/${currentSession}`);
        document.getElementById('status-panel').innerHTML = 
            '<span class="stopped">⏹️ Campaign STOPPED</span>';
    }
    </script>
</body>
</html>
